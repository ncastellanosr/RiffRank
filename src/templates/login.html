<!DOCTYPE html>
<html lang="en-US">
    <head>
        <title>RiffRank - Login</title>
        <meta charset="UTF-8">
        <link rel="icon" type="image/x-icon" href="{{url_for('static', filename='img/Children Of Bodom.ico')}}">
        <link rel="stylesheet" href="{{url_for('static', filename='css/global.css')}}">
        <link rel="stylesheet" href="{{url_for('static', filename='css/login.css')}}">
    </head>
    <body>
        <header>
            <h1><a id="main-link" href="{{url_for('riffrank.artists')}}">RiffRank</a></h1>
        </header>
        <main>
            <form method="POST">
                <h2>Log In / Register</h2>
                <div class="field">
                    <p>Username</p>
                    <input type="text" class="input-field" name="username">
                </div>
                <div class="field">
                    <p>Password</p>
                    <input type="password" class="input-field" name="password">
                </div>
                <div class="field">
                    <div class="radio-field">
                        <input type="radio" id="login" name="action" value="login" checked>
                        <label for="login">Log In</label>
                    </div>
                    <div class="radio-field">
                        <input type="radio" id="signup" name="action" value="signup">
                        <label for="signup">Sign Up</label>
                    </div>
                </div>
                <button type="submit" name="submit">Submit</button>
            </form>
        </main>
    </body>
</html>
